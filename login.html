<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-field">
        <label class="login-label">Почта</label>
        <input type="email" id="email" class="login-input" placeholder="Введите почту" autocomplete="email">
      </div>
      <div class="login-field">
        <label class="login-label">Пароль</label>
        <input type="password" id="password" class="login-input" placeholder="Введите пароль" autocomplete="current-password">
      </div>
      <div class="login-remember">
        <label class="checkbox-label">
          <input type="checkbox" id="remember">
          <span class="checkbox-custom"></span>
          Запомнить меня
        </label>
      </div>
      
      <div class="login-error" id="loginError"></div>
      <div class="login-footer">
        <a href="#" class="forgot-link">Забыли пароль?</a>
        <button class="btn-login" id="loginBtn">ВОЙТИ</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errorEl.textContent = '';


      btn.disabled = true;
      btn.textContent = 'ВХОД...';

      try {
        const resp = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json();

        if (data.success) {
          sessionStorage.setItem('authenticated', 'true');
          sessionStorage.setItem('userEmail', data.email);
          window.location.href = 'index.html';
        } else {
          errorEl.textContent = data.error || 'Неверная почта или пароль';
        }
      } catch (e) {
        errorEl.textContent = 'Ошибка соединения с сервером';
      }

      btn.disabled = false;
      btn.textContent = 'ВОЙТИ';
    }
  </script>
</body>
</html>
